{% load static %}
{% load icons %}
<div class="d-flex justify-content-between">
  <div class="h3 integration-title">
    <img class="img-fluid"
         src="{% static core.integration_data.integration_metadata.logo_static_path %}"
         alt="{{ core.integration_data.integration_metadata.label }} Logo">
    {{ core.integration_data.integration_metadata.label }}
  </div>
  <div class="d-flex">
    {% include "integrations/panes/lifecycle_actions.html" %}
    <form action="{% url 'hass_sync' %}"
        method="POST" role="form" data-async="true">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-secondary" role="button"
              name="action" value="sync" >
        {% if has_entities %}
        {% icon "sync" size="sm" css_class="hi-icon-left" %}RE-SYNC
        {% else %}
        {% icon "upload" size="sm" css_class="hi-icon-left" %}IMPORT
        {% endif %}
      </button>
    </form>
  </div>
</div>
{% if not has_entities %}
<div class="alert alert-warning text-center">
  Use the "IMPORT" button to add items from Home Assistant.
</div>
{% endif %}

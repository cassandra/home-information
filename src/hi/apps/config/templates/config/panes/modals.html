<!-- Reset Subsystem Settings Modal -->
<div class="modal fade" id="resetSubsystemModal" tabindex="-1" role="dialog" aria-labelledby="resetSubsystemModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="resetSubsystemModalLabel">Confirm Reset</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        Are you sure you want to reset <span id="modalSubsystemName"></span> settings? This action cannot be undone.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <a id="confirmResetSubsystemBtn" href="#" class="btn btn-danger">Reset</a>
      </div>
    </div>
  </div>
</div>

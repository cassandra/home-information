{% load static %}
{% load common_tags %}
<link rel="stylesheet" href="{% static 'css/svg-location-color.css' %}">
<div id="{{ DIVID.LOCATION_SVG_EDIT_CANVAS }}" class="hi-location-view">
  <svg id="{{ DIVID.LOCATION_SVG_EDIT_SVG }}"
       class="hi-location-view-svg"
       xmlns="http://www.w3.org/2000/svg"
       viewBox="{{ svg_view_box }}"
       extents="{{ svg_view_box }}"
       width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
    <defs>
      {% include "location/panes/svg_fill_patterns_color.html" %}
    </defs>
    {% include "location/edit/svg/svg_edit_palette.svg" %}
    <rect class="hi-svg-edit-boundary" x="{{ svg_view_box.x }}" y="{{ svg_view_box.y }}"
          width="{{ svg_view_box.width }}" height="{{ svg_view_box.height }}"
          pointer-events="none" />
    <g class="hi-location-view-base">
      {% include_media_template draft_svg_filename %}
    </g>
  </svg>
</div>

{# Motion chip overlaid on the camera stream. ``motion_data`` is    #}
{# the MOVEMENT role's display data (passed via the camera panel's #}
{# role_data_template_aliases). CSS rules keyed on the chip's     #}
{# ``status`` attribute drive the decay-aware coloring.           #}
<div class="motion-chip"
     data-state-id="{{ motion_data.entity_state.id }}"
     data-status
     status="{{ motion_data.svg_status_style.status_value }}"
     title="Motion">
  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.89 19.38l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
  </svg>
</div>

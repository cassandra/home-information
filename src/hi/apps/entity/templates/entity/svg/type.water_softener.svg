<circle cx="50" cy="50" r="1.5" fill="#f5f5f0" stroke="#ddd" stroke-width="0.5"/>
<circle cx="42" cy="55" r="1.5" fill="#f5f5f0" stroke="#ddd" stroke-width="0.5"/>

<rect class="hi-entity-bg" x="0" y="0" width="64" height="64" fill="none"/>

<!-- Motor housing unit -->
<rect x="6" y="20" width="24" height="18" rx="2" fill="#e0e0e0" stroke="#555" stroke-width="1.5"/>

<!-- Light bulb cover on motor -->
<circle cx="12" cy="38" r="4" fill="#fff3cd" stroke="#555" stroke-width="1"/>
<circle cx="12" cy="38" r="2" fill="#ffd700" opacity="0.6"/>

<!-- Drive rail -->
<rect x="28" y="27" width="30" height="4" rx="1" fill="#aaa" stroke="#555" stroke-width="1"/>

<!-- Chain/belt on rail -->
<line x1="30" y1="29" x2="56" y2="29" stroke="#777" stroke-width="1" stroke-dasharray="2,2"/>

<!-- Trolley on rail -->
<rect x="44" y="24" width="8" height="10" rx="1" fill="#c0c0c0" stroke="#555" stroke-width="1"/>

<!-- Arm connecting to door -->
<line x1="48" y1="34" x2="48" y2="48" stroke="#555" stroke-width="2" stroke-linecap="round"/>
<line x1="44" y1="48" x2="52" y2="48" stroke="#555" stroke-width="2" stroke-linecap="round"/>

<!-- Mounting brackets -->
<rect x="14" y="16" width="4" height="6" fill="#888"/>
<rect x="54" y="24" width="4" height="4" fill="#888"/>

<!-- Status LED on motor -->
<circle cx="24" cy="25" r="1.5" fill="#4caf50"/>

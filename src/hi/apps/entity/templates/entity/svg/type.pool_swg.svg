<rect class="hi-entity-bg" x="0" y="0" width="64" height="64" fill="none"/>

<!-- Control box body -->
<rect x="8" y="4" width="48" height="38" rx="3" fill="#e8e8e8" stroke="#555" stroke-width="1.5"/>

<!-- Display screen -->
<rect x="14" y="9" width="24" height="14" rx="1" fill="#1a1a2e" stroke="#333" stroke-width="1"/>

<!-- Salt level display -->
<text x="26" y="16" font-family="monospace" font-size="5" fill="#4caf50" text-anchor="middle">3200</text>
<text x="26" y="21" font-family="monospace" font-size="3" fill="#888" text-anchor="middle">PPM</text>

<!-- Status LEDs -->
<circle cx="43" cy="12" r="2" fill="#4caf50"/>
<circle cx="43" cy="18" r="2" fill="#f39c12"/>
<circle cx="49" cy="12" r="2" fill="#3498db"/>
<circle cx="49" cy="18" r="2" fill="#999" opacity="0.4"/>

<!-- Output % dial -->
<circle cx="26" cy="33" r="6" fill="#ddd" stroke="#555" stroke-width="1"/>
<circle cx="26" cy="33" r="1" fill="#555"/>
<line x1="26" y1="33" x2="29" y2="29" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>

<!-- Boost button -->
<rect x="36" y="28" width="14" height="8" rx="2" fill="#3498db" stroke="#2980b9" stroke-width="0.5"/>
<text x="43" y="33.5" font-family="sans-serif" font-size="4" fill="#fff" text-anchor="middle">BOOST</text>

<!-- Cable to cell -->
<path d="M32,42 L32,46" stroke="#555" stroke-width="2" stroke-linecap="round"/>

<!-- Electrolytic cell (inline pipe section) -->
<rect x="16" y="46" width="32" height="14" rx="4" fill="#c0c0c0" stroke="#555" stroke-width="1.5"/>

<!-- Cell electrode plates inside -->
<line x1="24" y1="49" x2="24" y2="57" stroke="#888" stroke-width="1"/>
<line x1="28" y1="49" x2="28" y2="57" stroke="#888" stroke-width="1"/>
<line x1="32" y1="49" x2="32" y2="57" stroke="#888" stroke-width="1"/>
<line x1="36" y1="49" x2="36" y2="57" stroke="#888" stroke-width="1"/>
<line x1="40" y1="49" x2="40" y2="57" stroke="#888" stroke-width="1"/>

<!-- Pipe connections -->
<rect x="6" y="49" width="12" height="6" rx="2" fill="#6699cc" stroke="#555" stroke-width="0.8"/>
<rect x="46" y="49" width="12" height="6" rx="2" fill="#6699cc" stroke="#555" stroke-width="0.8"/>

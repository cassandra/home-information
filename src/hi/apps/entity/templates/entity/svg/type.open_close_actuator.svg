<rect class="hi-entity-bg" x="0" y="0" width="64" height="64" fill="none"/>

<!-- Motor housing -->
<rect x="6" y="22" width="26" height="20" rx="3" fill="#d8d8d8" stroke="#555" stroke-width="2"/>

<!-- Cooling fins -->
<line x1="14" y1="24" x2="14" y2="40" stroke="#888" stroke-width="1"/>
<line x1="20" y1="24" x2="20" y2="40" stroke="#888" stroke-width="1"/>
<line x1="26" y1="24" x2="26" y2="40" stroke="#888" stroke-width="1"/>

<!-- Push rod -->
<rect x="32" y="29" width="18" height="6" rx="1" fill="#bbb" stroke="#555" stroke-width="1.5"/>

<!-- Rod end clevis -->
<rect x="50" y="26" width="6" height="12" rx="1" fill="#888" stroke="#555" stroke-width="1.5"/>

<!-- Bidirectional motion arrows above the rod -->
<line x1="36" y1="16" x2="56" y2="16" stroke="#1976d2" stroke-width="2.5" stroke-linecap="round"/>
<line x1="36" y1="16" x2="40" y2="12" stroke="#1976d2" stroke-width="2.5" stroke-linecap="round"/>
<line x1="36" y1="16" x2="40" y2="20" stroke="#1976d2" stroke-width="2.5" stroke-linecap="round"/>
<line x1="56" y1="16" x2="52" y2="12" stroke="#1976d2" stroke-width="2.5" stroke-linecap="round"/>
<line x1="56" y1="16" x2="52" y2="20" stroke="#1976d2" stroke-width="2.5" stroke-linecap="round"/>

<!-- Status LED on motor -->
<circle cx="11" cy="32" r="2" fill="#4caf50"/>

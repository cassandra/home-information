<div class="hue-control">
  <input type="range"
         name="value"
         min="0"
         max="360"
         value="{{ controller_data.latest_sensor_response.value|default:0 }}"
         class="{{ controller_data.css_class }} hi-continuous-slider hue-slider"
         {{ DIVID.CONTROLLER_DISPLAY_TARGET_ATTR }}=".hue-value"
         {{ DIVID.CONTROLLER_DISPLAY_FORMAT_ATTR }}="{n}°"
         onchange-async="true"
         data-controller-id="{{ controller_data.controller.id }}">
  <div class="hue-display">
    <span class="hue-value">{{ controller_data.latest_sensor_response.value|default:0 }}°</span>
  </div>
</div>

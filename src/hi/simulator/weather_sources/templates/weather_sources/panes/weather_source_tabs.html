<div>
  <ul id="hi-simulator-weather-tabs" class="nav nav-tabs" role="tablist">
    {% for tab in tab_contexts %}
    <li class="nav-item">
      <a id="hi-simulator-weather-tab-{{ tab.short_name }}" role="tab"
         class="nav-link {% if forloop.first %}active{% endif %}"
         data-toggle="tab"
         href="#weather-source-{{ tab.short_name }}"
         aria-controls="weather-source-{{ tab.short_name }}"
         aria-selected="{% if forloop.first %}true{% else %}false{% endif %}">
        {{ tab.label }}</a>
    </li>
    {% endfor %}
  </ul>

  <div id="hi-simulator-weather-content" class="tab-content">
    {% for tab in tab_contexts %}
    <div id="weather-source-{{ tab.short_name }}" role="tabpanel"
         class="tab-pane fade {% if forloop.first %}show active{% endif %}"
         aria-labelledby="hi-simulator-weather-tab-{{ tab.short_name }}">
      <div class="d-flex align-items-center mb-2">
        {% include "profile/panes/profile_selector.html" with module=tab profile_list=tab.profile_list current_profile=tab.current_profile %}
      </div>
      {% include tab.tab_template %}
    </div>
    {% endfor %}
  </div>
</div>

<script>
  $(document).ready(function () {
   $('#hi-simulator-weather-tabs a[data-toggle="tab"]').on('shown.bs.tab', function (event) {
     const tabId = $(event.target).attr('href');
     history.replaceState(null, null, tabId);
   });

   const hash = window.location.hash;
   if ( hash ) {
     const targetTab = document.querySelector(`#hi-simulator-weather-tabs .nav-link[href="${hash}"]`);
     if ( targetTab ) {
       new bootstrap.Tab( targetTab ).show();
     }
   }
 });
</script>
